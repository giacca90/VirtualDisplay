<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>Virtual Display</title>
		<link rel="icon" href="virtualScreenOn.png" type="image/png" />
		<style>
			#info {
				color: #333;
				text-align: center;
				width: 80%;
				margin-left: auto;
				margin-right: auto;
				position: absolute;
				top: 50%;
				left: 50%;
				transform: translate(-50%, -50%);
				z-index: 100;
				background: rgba(255, 255, 255, 0.9);
				padding: 20px;
				border-radius: 12px;
				box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
				font-family: sans-serif;
			}
			.hidden-info {
				visibility: hidden !important;
			}
			body {
				position: relative;
				min-height: 100vh;
			}
			#container {
				position: relative;
				width: 100%;
			}
			#container:fullscreen {
				background: black;
				display: flex;
				align-items: center;
				justify-content: center;
			}
			#container:fullscreen #stream {
				width: 100%;
				height: 100%;
				object-fit: contain;
				margin: 0;
			}
			#stream {
				display: block;
				width: 100%;
				margin: 4px 0 0 0;
			}
		</style>
	</head>
	<body>
		<h1>Virtual Display</h1>
		<div id="container">
			<h3 id="info">Conectando al servidor...</h3>
			<video id="stream" autoplay playsinline controls></video>
		</div>
		<script src="client.js"></script>
	</body>
</html>
